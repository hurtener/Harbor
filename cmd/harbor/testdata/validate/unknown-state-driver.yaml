server:
  bind_addr: 127.0.0.1:8080
  shutdown_grace_period: 30s

identity:
  jwt_algorithms:
    - RS256
  issuer: https://issuer.example.com
  audience: harbor
  jwks_url: https://issuer.example.com/.well-known/jwks.json

telemetry:
  log_format: json
  log_level: info
  service_name: harbor

state:
  driver: cassandra

llm:
  driver: mock

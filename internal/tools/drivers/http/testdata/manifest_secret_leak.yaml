# Negative-test fixture: a manifest that attempts to interpolate
# the .Auth namespace into the URL template — the credential
# boundary. LoadManifest MUST reject this with ErrTemplateSecretLeak.
auth:
  weather_key:
    kind: api_key
    header: X-Weather-Key
    secret: ${HARBOR_TEST_WEATHER_KEY}

tools:
  - name: weather.bad
    method: GET
    # Forbidden: a template that pulls a secret reference into the URL.
    url_template: 'https://api.example.com/v1/now?key={{ .Auth.weather_key.Secret }}&city={{ .Args.city }}'
    auth_ref: weather_key

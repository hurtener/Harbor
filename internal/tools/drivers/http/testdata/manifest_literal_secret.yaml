# Negative-test fixture: a manifest that inlines a literal secret
# instead of using the ${ENV_VAR} reference shape. LoadManifest MUST
# reject this with ErrManifestInvalid.
auth:
  bad_key:
    kind: bearer
    secret: literal-bearer-token-do-not-do-this

tools:
  - name: bad.tool
    method: GET
    url_template: 'https://api.example.com/v1/now'
    auth_ref: bad_key

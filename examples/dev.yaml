# Harbor — `harbor dev` example configuration (Phase 64, D-089).
#
# This is the canonical config for the local-dev loop. It points at
# the production bifrost LLM driver — Phase 64 (D-089) flipped the
# default from "mock" to "bifrost" so a missing `llm.driver` is the
# fail-loud case, not a silent stub. Operators copy this file to
# `harbor.yaml` at their project root and edit:
#
#   1. `identity.issuer` / `identity.audience` / `identity.jwks_url`
#      to point at a real OIDC provider. The default `harbor dev`
#      mints an ephemeral ES256 dev token for local convenience —
#      production deployments need a real JWKS source.
#
#   2. `llm.api_key` — the example uses `env.OPENROUTER_API_KEY`. The
#      bifrost driver resolves `env.NAME` references via os.Getenv()
#      at construction time; missing env var → fail closed with
#      ErrMissingAPIKey at boot. Pick whichever env var your secret
#      store populates.
#
#   3. Optional: `llm.model` if the default `anthropic/claude-sonnet-4`
#      isn't what your deployment routes through.
#
# Once edited, run:
#
#   harbor dev               # boots against ./harbor.yaml on :18080
#   harbor dev --port 8080   # custom port
#
# For the dev-only escape hatch (the §13 amendment surface):
#
#   HARBOR_DEV_ALLOW_MOCK=1 harbor dev
#
# The escape hatch prints a stderr banner [DEV-ONLY MOCK LLM — DO
# NOT USE IN PRODUCTION] on every boot. The default path with no
# flag set demands a real provider.

server:
  bind_addr: 127.0.0.1:8080
  shutdown_grace_period: 30s

identity:
  # Asymmetric algorithms only (Harbor §7 security rule 1). The
  # validator's parser rejects HS* and `none` at the algorithm
  # allowlist BEFORE the keyfunc runs.
  jwt_algorithms:
    - RS256
    - ES256
  # Replace these with your OIDC provider's values for non-local
  # deployments. The `harbor dev` ephemeral dev-token bypass uses
  # its own in-memory keypair (issuer=harbor-dev, audience=harbor);
  # production wiring through jwks_url lands in a later release-
  # engineering phase.
  issuer: https://issuer.example.com
  audience: harbor
  jwks_url: https://issuer.example.com/.well-known/jwks.json

telemetry:
  log_format: text
  log_level: info
  service_name: harbor-dev

state:
  # In-memory state for the dev loop. Production switches to sqlite
  # (single-node) or postgres (multi-replica). The Phase 57 durable
  # event log requires a non-inmem state driver — flip both together.
  driver: inmem

llm:
  # Production driver — the Phase 33 bifrost gateway. Phase 64 /
  # D-089 made this the default; a missing `driver:` field defaults
  # to bifrost. The mock LLM is only available via the `HARBOR_DEV_ALLOW_MOCK=1`
  # env var (the §13 dev-only escape hatch).
  driver: bifrost
  provider: openrouter
  model: anthropic/claude-sonnet-4
  # Resolved as os.Getenv("OPENROUTER_API_KEY") at driver construction
  # time. Pick whichever env var your secret store populates. NEVER
  # commit a literal API key here — the validator accepts a literal
  # value but the linter / reviewer SHOULD reject the PR.
  api_key: env.OPENROUTER_API_KEY
  timeout: 60s
  context_window_reserve: 0.05
  model_profiles:
    anthropic/claude-sonnet-4:
      context_window_tokens: 200000
      token_estimator: chars_div_4
      json_schema_mode: native
      reasoning_effort: low

governance:
  repair_attempts: 3

events:
  driver: inmem
  max_subscribers_per_session: 16
  subscriber_buffer_size: 256
  idle_timeout: 60s
  drop_window: 1s
  replay_buffer_size: 10000

sessions:
  idle_ttl: 24h
  hard_cap: 720h
  sweep_interval: 15m

artifacts:
  driver: inmem
  heavy_output_threshold_bytes: 32768

tasks:
  driver: inprocess
  retain_turn_timeout: 5m
  continuation_hop_limit: 8

distributed:
  bus_driver: loopback
  remote_driver: loopback

memory:
  # `none` (Phase 23 default — AddTurn is a no-op) is the safest
  # starting point. Flip to `rolling_summary` once you have a working
  # agent and need conversation compaction; Phase 64 wires an
  # LLM-backed Summarizer through llm/summarizer when this is set.
  driver: inmem
  strategy: none
  recovery_backlog_max: 16

# D-103 — Planner driver selection (closes issue #126). The V1
# reference planner is `react` (the LLM-driven ReAct concrete from
# Phase 45 / D-051). Future drivers (Plan-Execute, Workflow, Graph,
# Deterministic, Supervisor, MultiAgent, HumanApproval per RFC §6.2)
# self-register under `internal/planner/<name>/` + a blank import in
# `cmd/harbor/main.go`; flip `driver:` to opt into them.
#
# `max_steps` overrides the driver-side circuit-breaker step cap.
# Zero (the default) means "use the driver's internal default" —
# `react.DefaultMaxSteps` (12) for the V1 reference driver. Raise for
# longer trajectories; lower to fail fast in tests.
planner:
  driver: react
  # max_steps: 12
  # reasoning_replay: never   # never (default, all models) | text — see harbor.yaml

tools:
  http_manifests: []
  mcp_servers: []

  # Phase 83n / D-153 + Phase 107c / D-167 — opt in to the small set
  # of built-in tools shipped in the Harbor binary. Empty list (the
  # default) registers nothing. Available names mirror
  # `internal/tools/builtin.KnownNames()` and are validated pre-boot
  # by `internal/config` — a typo fails closed at config load.
  #
  # Default-recommended set (lights up the discovery loop end-to-end):
  #
  #   built_in:
  #     - clock.now      # heartbeat / sanity-check
  #     - text.echo      # smoke-test action
  #     - tool_search    # LLM discovers deferred tools by capability
  #     - tool_get       # LLM fetches a tool's full schema
  #     - skill_search   # LLM discovers skills (Phase 37 SkillStore)
  #     - skill_get      # LLM fetches a skill body
  #
  # Optional escape-hatch (Phase 107c step 10 — D-167):
  #
  #   built_in:
  #     # ...the discovery set...
  #     - declarative_action
  #
  # The `declarative_action` meta-tool lets the LLM dispatch any
  # catalog tool through a typed `{tool, args}` envelope (or a free-
  # text `body` parsed via `repair.ActionParser`). Use ONLY when your
  # provider lacks reliable native tool-calling — local Llama / Mistral
  # / weaker fine-tunes that emit prompt-engineered JSON instead of
  # provider-native tool_calls. Modern providers (OpenAI / Anthropic /
  # Gemini, including OpenRouter routes through them) emit native
  # tool_calls and the escape hatch is unnecessary noise. The meta-
  # tool registers with `loading_mode: deferred` so it stays out of
  # every-turn declarations until `tool_search("structured action
  # format")` surfaces it — keeping the prompt budget clean when
  # operators opt in but the LLM doesn't actually need it.
  # built_in: []

  # D-095 — Operator-config-driven OAuth provider declarations (closes
  # issue #116 + D-090's deferred construction gap). Uncomment and
  # populate to attach OAuth-bound tools to a real authorization
  # server. The V1 default driver is `oauth2` (generic OAuth2/PKCE
  # Authorization Code flow); future per-vendor drivers
  # (`google-workspace`, `github-app`, ...) add a new entry under
  # `internal/tools/auth/drivers/<name>/` + a blank import in
  # `cmd/harbor/main.go`.
  #
  # Credentials enter via env-var indirection (§7 rule 2 — never
  # hardcoded, never logged). The dev stack resolves `os.Getenv(NAME)`
  # at boot and fails closed when the env var is unset or empty.
  #
  # `oauth_token_kek_env` names the env var holding the 32-byte
  # hex-encoded key-encryption key (KEK) for AES-256-GCM token
  # encryption at rest. Required whenever `oauth_providers[]` is
  # non-empty. Generate via e.g. `openssl rand -hex 32`. NEVER commit
  # the literal KEK.
  #
  # oauth_token_kek_env: HARBOR_OAUTH_TOKEN_KEK
  # oauth_providers:
  #   - name: github
  #     driver: oauth2
  #     client_id_env: GITHUB_OAUTH_CLIENT_ID
  #     client_secret_env: GITHUB_OAUTH_CLIENT_SECRET
  #     scopes: ["repo", "read:user"]
  #     auth_url: https://github.com/login/oauth/authorize
  #     token_url: https://github.com/login/oauth/access_token
  #     redirect_url: https://your-deployment.example.com/oauth/callback

# Phase 65 (D-099) — `harbor dev` hot-reload supervisor. The block is
# opt-out: every field has a loader-applied default that mirrors the
# values below; omit the block entirely to inherit them. Operators that
# want hot-reload off pass `--no-hot-reload` to `harbor dev` OR set
# `enabled: false` here OR set `policy: disabled`. Restart-required.
cli:
  dev_hot_reload:
    # `enabled: true` is the default; flip to false to disable the
    # watcher entirely (equivalent to passing `--no-hot-reload`).
    enabled: true
    # `policy: drain` (default) waits up to `drain_timeout` for in-
    # flight RunLoops before forcing close. `policy: cancel`
    # immediately cancels in-flight; `policy: disabled` opts out at
    # the config layer (equivalent to `enabled: false`).
    policy: drain
    drain_timeout: 5s
    # The watcher unions these paths with the loaded config file's
    # parent directory, so a `harbor.yaml` edit always triggers a
    # reload. Defaults to `[".harbor/agents"]` — the Phase 66
    # project-local drafts directory.
    watch_roots:
      - .harbor/agents

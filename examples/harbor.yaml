# Harbor — example configuration. Copy and adapt; values shown here
# are reasonable defaults for a local-dev binding. Production
# deployments should override jwks_url, llm.api_key, and any
# governance ceilings to match the operator's policy.

server:
  bind_addr: 127.0.0.1:8080
  shutdown_grace_period: 30s

identity:
  jwt_algorithms:
    - RS256
    - ES256
  issuer: https://issuer.example.com
  audience: harbor
  jwks_url: https://issuer.example.com/.well-known/jwks.json

telemetry:
  log_format: json
  log_level: info
  service_name: harbor

state:
  driver: inmem

llm:
  provider: openrouter
  model: anthropic/claude-sonnet-4
  # Override via HARBOR_LLM_API_KEY in production; never commit a real key.
  api_key: replace-me
  timeout: 60s

governance:
  default_max_tokens: 4096
  repair_attempts: 3

events:
  driver: inmem
  # Per-session subscriber cap. The 17th subscribe in the same
  # (tenant, user, session) returns ErrSubscriberLimitReached.
  max_subscribers_per_session: 16
  # Per-subscriber buffer; on overflow the oldest event is dropped
  # and a bus.dropped event lands in the subscriber's stream.
  subscriber_buffer_size: 256
  # A subscription whose Events() channel hasn't been drained for
  # this long is reaped and emits bus.subscription_idle_closed.
  idle_timeout: 60s
  # At most one bus.dropped event per subscriber per drop_window
  # — windows the drop notifications under saturation.
  drop_window: 1s

artifacts:
  # `inmem` (per-process, dev/embedded floor), `fs` (single-binary
  # production target), `sqlite` (Phase 18 — durable, single-node),
  # or `postgres` (Phase 18 — durable, multi-replica safe). Phase 19
  # adds an S3-style driver.
  driver: inmem
  # Required when driver=fs; the root directory under which the
  # `<root>/<tenant>/<user>/<session>/<task>/<namespace>/<id>` blob
  # tree lands. Created (`os.MkdirAll`) at boot.
  # fs_root: /var/lib/harbor/artifacts
  # Required when driver=sqlite or driver=postgres. SQLite accepts a
  # bare file path (or `:memory:` for the degenerate dev case);
  # Postgres accepts a standard URL form
  # (`postgres://user:pass@host:5432/db?sslmode=disable`) or pgx
  # key-value form. Override via HARBOR_ARTIFACTS_DSN in production;
  # never commit a real password.
  # dsn: /var/lib/harbor/artifacts.sqlite
  # Heavy-output threshold: payloads at or above this byte size are
  # mandatorily routed through the ArtifactStore (D-022, RFC §6.10).
  # Default 32 KB. Per-tool overrides land at Phase 26.
  heavy_output_threshold_bytes: 32768

tasks:
  # TaskRegistry driver. Phase 20 ships only `inprocess` — an
  # in-memory registry that persists every lifecycle transition
  # through the StateStore (D-027 typed wrapper). Post-V1 phases
  # (e.g. a durable queue-backed driver at Phase 87+) extend the
  # allowlist.
  driver: inprocess

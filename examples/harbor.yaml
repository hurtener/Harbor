# Harbor — example configuration. Copy and adapt; values shown here
# are reasonable defaults for a local-dev binding. Production
# deployments should override jwks_url, llm.api_key, and any
# governance ceilings to match the operator's policy.

server:
  bind_addr: 127.0.0.1:8080
  shutdown_grace_period: 30s

identity:
  jwt_algorithms:
    - RS256
    - ES256
  issuer: https://issuer.example.com
  audience: harbor
  jwks_url: https://issuer.example.com/.well-known/jwks.json

telemetry:
  log_format: json
  log_level: info
  service_name: harbor

state:
  driver: inmem

llm:
  provider: openrouter
  model: anthropic/claude-sonnet-4
  # Override via HARBOR_LLM_API_KEY in production; never commit a real key.
  api_key: replace-me
  timeout: 60s

governance:
  default_max_tokens: 4096
  repair_attempts: 3

events:
  driver: inmem
  # Per-session subscriber cap. The 17th subscribe in the same
  # (tenant, user, session) returns ErrSubscriberLimitReached.
  max_subscribers_per_session: 16
  # Per-subscriber buffer; on overflow the oldest event is dropped
  # and a bus.dropped event lands in the subscriber's stream.
  subscriber_buffer_size: 256
  # A subscription whose Events() channel hasn't been drained for
  # this long is reaped and emits bus.subscription_idle_closed.
  idle_timeout: 60s
  # At most one bus.dropped event per subscriber per drop_window
  # — windows the drop notifications under saturation.
  drop_window: 1s

artifacts:
  # `inmem` (per-process, dev/embedded floor) or `fs` (single-binary
  # production target). Phase 18 adds `sqlite-blob` + `postgres-blob`;
  # Phase 19 adds the `s3`-style driver (AWS S3 / MinIO / Cloudflare
  # R2 / any S3-compat backend).
  driver: inmem
  # Required when driver=fs; the root directory under which the
  # `<root>/<tenant>/<user>/<session>/<task>/<namespace>/<id>` blob
  # tree lands. Created (`os.MkdirAll`) at boot.
  # fs_root: /var/lib/harbor/artifacts
  # Heavy-output threshold: payloads at or above this byte size are
  # mandatorily routed through the ArtifactStore (D-022, RFC §6.10).
  # Default 32 KB. Per-tool overrides land at Phase 26.
  heavy_output_threshold_bytes: 32768
  # S3-style driver fields (Phase 19). Required when driver=s3:
  #   s3_bucket — the bucket; the driver does NOT create it (operator
  #               provisions out of band). HeadBucket runs at boot to
  #               surface misconfigs early.
  #   s3_endpoint — base URL for non-AWS backends (MinIO / R2 / GCS S3
  #                 compat). Leave empty for AWS-native deployments.
  #   s3_region — defaults to us-east-1 when unset (covers MinIO + plain R2).
  #   s3_prefix — optional path prefix so multiple Harbor deployments
  #               can share one bucket.
  #   s3_access_key_id / s3_secret_access_key — when both empty, the
  #               SDK's default credential chain applies (env vars, IRSA,
  #               instance metadata, ~/.aws/credentials).
  #   s3_use_path_style — flip on for MinIO / older R2 endpoints; AWS
  #                       native deployments leave this off.
  # s3_bucket: harbor-artifacts
  # s3_endpoint: https://s3.amazonaws.com
  # s3_region: us-east-1
  # s3_prefix: harbor
  # s3_access_key_id: replace-me
  # s3_secret_access_key: replace-me
  # s3_use_path_style: false

# Harbor — example configuration. Copy and adapt; values shown here
# are reasonable defaults for a local-dev binding. Production
# deployments should override jwks_url, llm.api_key, and any
# governance ceilings to match the operator's policy.

server:
  bind_addr: 127.0.0.1:8080
  shutdown_grace_period: 30s

identity:
  jwt_algorithms:
    - RS256
    - ES256
  issuer: https://issuer.example.com
  audience: harbor
  jwks_url: https://issuer.example.com/.well-known/jwks.json

telemetry:
  log_format: json
  log_level: info
  service_name: harbor

state:
  driver: inmem

llm:
  # `bifrost` (Phase 33 — pure-Go gateway against OpenAI / Anthropic /
  # Google / OpenRouter / etc.) is the production default Phase 64
  # (D-089) flipped to. The `mock` driver (Phase 32 — test-grade, no
  # network) is reachable ONLY via the `HARBOR_DEV_ALLOW_MOCK=1` env
  # var when running `harbor dev` (the §13 dev-only escape hatch).
  driver: bifrost
  # Bifrost knobs — required when `driver: bifrost`. The mock driver
  # ignores these.
  #
  # The `api_key` field accepts a literal key OR an `env.NAME`
  # reference. Production deployments use `env.NAME` so secrets stay
  # out of the repo (Phase 33 fails closed at boot with
  # `ErrMissingAPIKey` if the named env var is unset).
  provider: openrouter
  model: anthropic/claude-sonnet-4
  # Production: `api_key: env.OPENROUTER_API_KEY` (Phase 33 resolves
  # at New time via os.Getenv).
  api_key: replace-me
  timeout: 60s
  # Context-window safety margin (Phase 32 / D-026). The LLM-edge
  # safety pass fails with ErrContextWindowExceeded when the
  # estimated token count of an assembled CompleteRequest is within
  # this fraction of the model's configured `context_window_tokens`
  # cap. Range [0, 1). Default 0.05 (5%).
  context_window_reserve: 0.05
  # Per-model knobs. The safety pass REQUIRES an entry for every
  # model that appears in a CompleteRequest; missing profiles
  # surface as ErrUnsupportedModel at request time.
  model_profiles:
    anthropic/claude-sonnet-4:
      # Hard input-token cap; the safety pass's token-budget guard
      # reads this and applies `context_window_reserve` to it.
      context_window_tokens: 200000
      # Estimator algorithm. "" or "chars_div_4" — default
      # chars/4 + per-message overhead.
      token_estimator: chars_div_4
      # Phase 35 — structured-output strategy. Allowed values:
      #   ""         → fall back to per-known-provider default
      #                 (OpenAI/Anthropic/Google → "native";
      #                  NIM/custom OpenAI-compat → "prompted";
      #                  o1/o3/deepseek-reasoner → "prompted")
      #   "native"   → pass FormatJSONSchema through to the provider
      #   "tools"    → Harbor-side prompted envelope (NOT provider
      #                tool-calling APIs); runtime parses locally
      #   "prompted" → FormatJSONObject + schema in system prompt
      # The downgrade chain `native → prompted → text` fires on
      # `IsInvalidJSONSchemaError` failures.
      json_schema_mode: native
      # Phase 36 — caps the validator-driven retry-with-feedback loop
      # for this model. 0 (default) → DefaultMaxRetries (1). The
      # wrapper is a no-op when `req.Validator` is nil.
      # max_retries: 1
      # Phase 36b reads — identity-tier MaxTokens default.
      # default_max_tokens: 4096
      # Phase 33 routes — "off" / "low" / "medium" / "high" / "".
      reasoning_effort: low
      # Phase 36a fallback — per-1M-token rates when the provider
      # doesn't report cost (some OpenRouter routes don't).
      # cost_overrides:
      #   input_per_1m_tokens: 3.0
      #   output_per_1m_tokens: 15.0
      #   currency: USD
    google/gemini-3.1-flash-lite:
      context_window_tokens: 1000000
      token_estimator: chars_div_4
      json_schema_mode: native
      reasoning_effort: ""
      # Phase 34 per-provider correction overrides (optional). The
      # corrections layer infers sensible defaults from the model
      # name prefix; this block lets the operator override per model.
      #
      # corrections:
      #   message_ordering: ""             # "" / "system_first_strict" (NIM)
      #   schema_mode: ""                  # "" / "openai_strict" / "permissive"
      #   reasoning_effort_routing: ""     # "" / "thinking_model" (o1/o3/deepseek-reasoner)
      #   response_format_shape: ""        # "" / "json_only" / "anthropic"
      #   usage_backfill_enabled: false    # synth tokens+cost when provider reports 0/0
  # Phase 34 — per-provider correction layer toggle. Enabled by
  # default (operators who omit this block get production-correct
  # behaviour). Set `enabled: false` only for tests that need to
  # exercise the safety pass in isolation.
  #
  # corrections:
  #   enabled: true

  # Phase 33a — custom OpenAI-compatible providers. Lets operators
  # wire NIM, vLLM, ollama, lm-studio, or any other OpenAI-compatible
  # endpoint without per-provider Go code. Set `llm.provider` to a
  # custom provider's `name` and bifrost routes traffic through the
  # custom configuration (the legacy `llm.api_key` / `llm.base_url` /
  # `llm.timeout` fields are ignored in that case).
  #
  # IMPORTANT URL gotcha: bifrost's OpenAI provider appends
  # `/v1/chat/completions` to `base_url`. NIM's host
  # (`https://integrate.api.nvidia.com`) is the right BaseURL form;
  # for endpoints whose URL already includes `/v1` use
  # `request_path_overrides` to set the suffix to `/chat/completions`.
  #
  # custom_providers:
  #   - name: nim
  #     base_url: https://integrate.api.nvidia.com
  #     # The env var NAME (no `env.` prefix); the driver resolves
  #     # os.Getenv(name) at New time. Missing env var → fail closed
  #     # at boot.
  #     api_key_env_var: NVIDIA_API_KEY
  #     models:
  #       - google/gemma-4-31b-it
  #     # NIM cold-start latency can exceed 60s; 180s is a conservative
  #     # default. Operators can tune per-deployment.
  #     timeout: 180s
  #     max_retries: 2
  #     retry_backoff_initial: 500ms
  #     retry_backoff_max: 5s
  #     # base_provider_type defaults to "openai" (Phase 33a only
  #     # supports OpenAI-compatible). Future phases widen.
  #     # base_provider_type: openai
  #     # Optional — override bifrost's default URL paths when the
  #     # endpoint diverges from OpenAI's path scheme. Keys are
  #     # bifrost RequestType strings ("chat_completion", etc.).
  #     # request_path_overrides:
  #     #   chat_completion: /chat/completions
  #
  # network_defaults:
  #   # Defaults applied to every provider (native + custom) when the
  #   # per-provider override is absent. Zero-valued fields fall
  #   # through to bifrost's package-level defaults.
  #   timeout: 60s
  #   max_retries: 3
  #   retry_backoff_initial: 500ms
  #   retry_backoff_max: 5s
  #   concurrency: 3
  #   buffer_size: 10

governance:
  repair_attempts: 3

  # Phase 36a + 36b — identity tier enforcement.
  #
  # **LATENT DEFAULT.** With the `identity_tiers` block omitted (or
  # `default_tier` empty), every governance policy is a permit no-op:
  # no cost ceilings fire, no rate limits drain, no MaxTokens cap
  # rejects. Operators opt in by populating `identity_tiers` with
  # one or more tiers and (optionally) naming a `default_tier` for
  # identities not otherwise mapped.
  #
  # **Removed in D-081.** The pre-Phase-36a single-knob fields
  # `default_max_tokens`, `cost_ceiling_usd`, and `rate_limit_tps`
  # are no longer accepted on this block. They were validated-but-
  # ignored stubs — the enforcement engine has only ever consumed
  # `identity_tiers`. The loader emits a structured
  # `config.deprecated_field` slog warning when any of those keys
  # appears in YAML, drops the value, and proceeds. Migrate by
  # building a `default` tier with the equivalent values:
  #
  # default_tier: default
  # identity_tiers:
  #   default:
  #     max_tokens: 4096       # was governance.default_max_tokens
  #     budget_ceiling_usd: 0  # was governance.cost_ceiling_usd
  #     # rate_limit_tps had no direct equivalent; the token-bucket
  #     # shape below (capacity + refill) is the new model.
  #
  # Each tier's fields are INDEPENDENTLY opt-in — set
  # `budget_ceiling_usd` only to enforce cost ceilings, leave
  # `rate_limit` and `max_tokens` zero to leave those latent.
  #
  # default_tier: free
  # identity_tiers:
  #   free:
  #     budget_ceiling_usd: 1.00
  #     max_tokens: 1000
  #     rate_limit:
  #       capacity: 100000
  #       refill_tokens: 50000
  #       refill_interval: 1h
  #   team:
  #     budget_ceiling_usd: 50.00
  #     max_tokens: 4000
  #     rate_limit:
  #       capacity: 1000000
  #       refill_tokens: 500000
  #       refill_interval: 1h
  #   enterprise:
  #     budget_ceiling_usd: 1000.00
  #     max_tokens: 16000
  #     # No rate_limit — enterprise tier is unbounded.

events:
  # `inmem` (Phase 05/06 — in-process bus + ring-buffer replay) or
  # `durable` (Phase 57 — StateStore-backed event log with exact,
  # gap-free replay that survives a Runtime restart).
  driver: inmem
  # Per-session subscriber cap. The 17th subscribe in the same
  # (tenant, user, session) returns ErrSubscriberLimitReached.
  max_subscribers_per_session: 16
  # Per-subscriber buffer; on overflow the oldest event is dropped
  # and a bus.dropped event lands in the subscriber's stream.
  subscriber_buffer_size: 256
  # A subscription whose Events() channel hasn't been drained for
  # this long is reaped and emits bus.subscription_idle_closed.
  idle_timeout: 60s
  # At most one bus.dropped event per subscriber per drop_window
  # — windows the drop notifications under saturation.
  drop_window: 1s
  # Ring-buffer capacity for replay. On the `inmem` driver this is
  # the replay ring (0 disables replay). On the `durable` driver it
  # sizes ONLY the best-effort fallback ring used when no StateStore
  # is configured.
  replay_buffer_size: 10000
  # StateStore selection for the `durable` driver — OPTIONAL and
  # ignored by every other driver. When driver=durable and
  # state_driver is empty, the durable driver auto-degrades to a
  # best-effort in-memory ring buffer and emits a LOUD runtime.warning
  # (replay is then NOT durable across restarts — D-074). state_dsn
  # is required whenever state_driver is sqlite or postgres.
  #   state_driver: sqlite
  #   state_dsn: /var/lib/harbor/events.db

artifacts:
  # `inmem` (per-process, dev/embedded floor), `fs` (single-binary
  # production target), `sqlite` (Phase 18 — durable, single-node),
  # `postgres` (Phase 18 — durable, multi-replica safe), or `s3`
  # (Phase 19 — S3-compatible: AWS / MinIO / Cloudflare R2 / GCS-
  # compat).
  driver: inmem
  # Required when driver=fs; the root directory under which the
  # `<root>/<tenant>/<user>/<session>/<task>/<namespace>/<id>` blob
  # tree lands. Created (`os.MkdirAll`) at boot.
  # fs_root: /var/lib/harbor/artifacts
  # Required when driver=sqlite or driver=postgres. SQLite accepts a
  # bare file path (or `:memory:` for the degenerate dev case);
  # Postgres accepts a standard URL form
  # (`postgres://user:pass@host:5432/db?sslmode=disable`) or pgx
  # key-value form. Override via HARBOR_ARTIFACTS_DSN in production;
  # never commit a real password.
  # dsn: /var/lib/harbor/artifacts.sqlite
  # Heavy-output threshold: payloads at or above this byte size are
  # mandatorily routed through the ArtifactStore (D-022, RFC §6.10).
  # Default 32 KB. Per-tool overrides land at Phase 26.
  heavy_output_threshold_bytes: 32768
  # S3-style driver fields (Phase 19). Required when driver=s3:
  #   s3_bucket — the bucket; the driver does NOT create it (operator
  #               provisions out of band). HeadBucket runs at boot to
  #               surface misconfigs early.
  #   s3_endpoint — base URL for non-AWS backends (MinIO / R2 / GCS S3
  #                 compat). Leave empty for AWS-native deployments.
  #   s3_region — defaults to us-east-1 when unset (covers MinIO + plain R2).
  #   s3_prefix — optional path prefix so multiple Harbor deployments
  #               can share one bucket.
  #   s3_access_key_id / s3_secret_access_key — when both empty, the
  #               SDK's default credential chain applies (env vars, IRSA,
  #               instance metadata, ~/.aws/credentials).
  #   s3_use_path_style — flip on for MinIO / older R2 endpoints; AWS
  #                       native deployments leave this off.
  # s3_bucket: harbor-artifacts
  # s3_endpoint: https://s3.amazonaws.com
  # s3_region: us-east-1
  # s3_prefix: harbor
  # s3_access_key_id: replace-me
  # s3_secret_access_key: replace-me
  # s3_use_path_style: false

tasks:
  # TaskRegistry driver. Phase 20 ships only `inprocess` — an
  # in-memory registry that persists every lifecycle transition
  # through the StateStore (D-027 typed wrapper). Post-V1 phases
  # (e.g. a durable queue-backed driver at Phase 87+) extend the
  # allowlist.
  driver: inprocess
  # Phase 21 backgroundtasks-config knobs (RFC §6.8). Both fields
  # must be > 0; defaults are applied when the section is omitted.
  retain_turn_timeout: 5m
  continuation_hop_limit: 8

memory:
  # MemoryStore driver — Phase 23 shipped `inmem`; Phase 25 adds
  # `sqlite` and `postgres` (durable across restart). Default
  # `inmem`.
  driver: inmem
  # DSN — required when driver is `sqlite` or `postgres`. SQLite
  # accepts a bare file path (or `:memory:` for the degenerate dev
  # case); Postgres accepts a standard URL form
  # (`postgres://user:pass@host:5432/db?sslmode=disable`) or pgx
  # key-value form. Override via HARBOR_MEMORY_DSN in production;
  # never commit a real password.
  # dsn: /var/lib/harbor/memory.sqlite
  # Memory shape strategy:
  #   - `none`            — AddTurn is a no-op; GetLLMContext returns empty.
  #   - `truncation`      — recent-turn window + budget enforcement (drop-oldest).
  #   - `rolling_summary` — recent window + background-summarised long-term
  #                         context. Health FSM observable via
  #                         `memory.health_changed`. Requires an injectable
  #                         Summarizer (LLM-backed at Phase 32+; not
  #                         registry-reachable today).
  strategy: none
  # Per-key token cap for truncation and rolling_summary; zero
  # disables budget enforcement (turns accumulate unbounded).
  budget_tokens: 0
  # Bounded queue size for the rolling_summary recovery loop
  # (D-034). Overflow drops oldest and emits
  # `memory.recovery_dropped` on the events bus. Default 16; must
  # be >= 0.
  recovery_backlog_max: 16

# D-103 — Planner driver selection (closes issue #126). The §4.4 seam
# pattern that D-095 uses for OAuth providers, applied to the planner
# concrete. V1 ships only the `react` driver (the reference LLM-driven
# ReAct concrete from Phase 45 / D-051). Future drivers (Plan-Execute,
# Workflow, Graph, Deterministic, Supervisor, MultiAgent, HumanApproval
# per RFC §6.2) self-register under `internal/planner/<name>/` + a
# blank import in `cmd/harbor/main.go`; flip `driver:` to opt in.
#
# `max_steps` overrides the driver-side circuit-breaker step cap. Zero
# (the default) means "use the driver's internal default" —
# `react.DefaultMaxSteps` (12) for the V1 reference driver. Raise for
# longer trajectories; lower to fail fast in tests.
#
# `extra_guidance` (Phase 83a, RFC §6.2) is operator-supplied
# domain-specific guidance injected verbatim into the rendered ReAct
# system prompt's `<additional_guidance>` section — voice/tone rules,
# domain interpretation hints, when-to-use-which-tool steering. Omit
# the key (the default) and the section is left out of the prompt
# entirely. The validator imposes no rule beyond "string"; the
# operator owns the content. Only the `react` driver consumes it.
#
# `reasoning_replay` (Phase 83e — D-148) controls whether a prior
# step's captured provider-side reasoning trace is re-injected into the
# next turn's prompt. Two values:
#   - `never` (the DEFAULT for ALL models; empty resolves here) — a
#     prior step's captured reasoning is never replayed; the next
#     prompt sees only the prior `{tool, args}` action JSON.
#   - `text` — the trajectory renderer prepends each prior step's
#     captured reasoning trace as a text block above the action JSON.
#     Per-agent opt-in for workloads that benefit from CoT continuity;
#     note it grows prompt size on chatty trajectories.
# There is no `provider_native` mode in V1.
#
# `max_tool_examples_per_tool` (Phase 83b — D-144) caps how many curated
# examples the rendered `<available_tools>` section emits per tool.
# Examples are ranked `minimal` > `common` > `edge-case` > untagged; the
# renderer keeps the top N. Zero / unset resolves to 3. Dial it down for
# catalogs with many tools to keep prompt token usage bounded.
#
# `parallel_tool_calls` (Phase 107d — D-169) toggles native parallel
# tool-call dispatch. Default true (omit the key): when the LLM returns
# several tool-calls in one turn, the React planner emits a native
# `CallParallel` and the runtime dispatches the branches concurrently.
# Set false to revert to the 107c serialization fallback (one tool-call
# per step). Both paths are correct; true is the intended end state.
#
# `skills_context_max` (Phase 83f — D-149) caps how many skill bodies
# the dev binary's per-task run loop fetches from `SkillStore.Search`
# and hands the planner via `RunContext.SkillsContext`. Zero / unset
# resolves to 5. Only consumed by the dev binary; library consumers
# that build their own RunContext are unaffected.
#
# `planning_hints` (Phase 83f — D-149) is the operator-supplied per-run
# planning steering the dev binary projects onto `RunContext.PlanningHints`.
# The ReAct planner renders the contents into `<planning_constraints>`
# via 83c's prompt section. V1.1 ships two YAML fields:
#   - `constraints` (string)         — free-form rules / negative space
#   - `preferred_tools` (list[str])  — names the planner prefers
# The richer Go-struct fields (ParallelGroups, DisallowTools, Budget)
# stay reachable via a custom planner Option but not via this YAML
# surface. Omit the block entirely and the section is left out of the
# prompt.
#
# Reasoning-capture note for Anthropic: Anthropic's extended-thinking
# API requires `reasoning.max_tokens >= 1024`. Harbor maps the LLM
# `reasoning_effort` enum to a budget for the Anthropic provider and
# FAILS LOUDLY (it does NOT silently clamp) when the resulting budget
# is below the floor — `reasoning_effort: low` against an Anthropic
# model is rejected at request-translation time. Use `medium` or
# `high` for Anthropic reasoning, or `off` to disable it.
planner:
  driver: react
  # max_steps: 12
  # extra_guidance: |
  #   Answer in formal English. When the answer is tabular data,
  #   call render_table before finishing and reference the artifact
  #   in your final answer.
  # reasoning_replay: never   # never (default) | text
  # parallel_tool_calls: true       # default true; false → serialise N>1 tool-calls (107c fallback)
  # max_tool_examples_per_tool: 3   # 0/unset → 3
  # skills_context_max: 5            # 0/unset → 5; cap on SkillStore.Search results per run
  # planning_hints:
  #   constraints: |
  #     Never call external download tools without confirming the URL
  #     resolves to an allowed source.
  #   preferred_tools:
  #     - youtube_get_metadata
  #     - http_get

# Phase 37 skills subsystem (RFC §6.7). The block is OPTIONAL — omit
# it entirely and skills stay uninitialised. When set, both `driver`
# and `dsn` are required.
# skills:
#   # SkillStore driver — Phase 37 ships `localdb` (CGo-free SQLite
#   # with FTS5 → regex → exact ranking ladder). Phase 49 will add
#   # `portico` (MCP-distributed skills).
#   driver: localdb
#   # DSN — required when driver=localdb. SQLite accepts a bare file
#   # path (or `:memory:` for the degenerate dev case). Override via
#   # HARBOR_SKILLS_DSN in production; never commit a real path with
#   # sensitive metadata.
#   dsn: /var/lib/harbor/skills.sqlite

tools:
  # Phase 27 HTTP tool driver. Each path points at a UTCP-style
  # YAML manifest describing one or more HTTP endpoints as Harbor
  # tools. Paths may be absolute (production deployment) or
  # relative to the working directory (dev loop). Secrets in
  # manifests MUST live in ${ENV_VAR} references — literal values
  # are rejected at load time. Example shapes:
  #
  #   http_manifests:
  #     - /etc/harbor/tools/weather.yaml
  #     - /etc/harbor/tools/github.yaml
  #
  # An absent or empty `http_manifests` list is valid — operators
  # with only in-process tools (registered via inproc.RegisterFunc)
  # don't need a manifest.
  http_manifests: []
  # MCP southbound attachments (Phase 28). Each entry boots a
  # *mcp.Provider whose discovered tools / resources / prompts merge
  # into the runtime catalog. The section is optional — operators
  # who don't attach external MCP servers omit it entirely.
  #
  # Per-server fields:
  #   name           — source-id prefix; must be unique across servers.
  #   transport_mode — `auto` | `sse` | `streamable_http` | `stdio`.
  #                    `auto` tries streamable-HTTP first, then SSE;
  #                    stdio is selected when only `command` is set.
  #   url            — required for sse / streamable_http (and auto
  #                    when transport is HTTP-flavoured).
  #   command        — required for stdio. ARGV-form ONLY: [0] is the
  #                    binary path, [1:] are arguments. Shell-form
  #                    (`sh -c "..."`) is FORBIDDEN per AGENTS.md §7.
  #   headers        — operator-supplied auth headers (bearer, API
  #                    key, etc.). Treated as secrets; redacted in
  #                    boot logs.
  #   keep_alive     — session ping interval; zero disables.
  #
  # Examples (commented):
  #
  # mcp_servers:
  #   - name: github
  #     transport_mode: streamable_http
  #     url: https://example.com/mcp/github
  #     headers:
  #       Authorization: Bearer replace-me
  #     keep_alive: 30s
  #
  #   - name: filesystem
  #     transport_mode: stdio
  #     command:
  #       - /usr/local/bin/mcp-server-filesystem
  #       - /var/data/filesystem-root
  mcp_servers: []

distributed:
  # MessageBus driver — Harbor's at-least-once cross-worker fan-out
  # edge. Phase 22 ships only `loopback` (in-process; projects
  # envelopes through the typed events.EventBus). Post-V1 phase 86
  # adds durable backends (NATS / Redis Streams / Postgres-as-queue).
  # Handlers MUST be idempotent on (TaskID, Edge, EventID) so the
  # same consumer code works against both V1 + durable drivers.
  bus_driver: loopback
  # RemoteTransport driver — Harbor's cross-process / cross-host call
  # surface, designed against the full A2A v1 spec (vendored at
  # docs/specifications/a2a.proto). Phase 22 ships `loopback`
  # (in-process dispatch to a registered Agent stub, used by
  # conformance tests); Phase 29 adds `a2a` (the wire driver: JSON-RPC
  # 2.0 over HTTPS + SSE, Agent Card discovery via
  # `GET /.well-known/agent-card.json`, route-scoring Registry).
  # When `remote_driver: a2a`, populate `tools.a2a_peers` below.
  remote_driver: loopback

# Phase 29 tools subsystem config — the unified tool catalog's per-
# transport peer lists. V1 ships only A2APeers; HTTP / MCP land in
# Phases 27 / 28. Omit the `tools:` block entirely when no remote
# tool sources are configured (the field is optional).
# tools:
#   a2a_peers:
#     # First-party in-org agent. HTTPS is required for non-loopback
#     # peers (AGENTS.md §7); the driver rejects http:// URLs whose
#     # host is not 127.0.0.1 / ::1 / localhost.
#     - url: https://agent.example.com
#       # Operator-set trust tier in [1, 5]: 1 = third-party with no
#       # contract, 5 = first-party in-org. The route-scoring
#       # registry uses this to rank peers when more than one declares
#       # the same capability (D-034: trust outranks latency 5:1).
#       trust_tier: 5
#       # Operator-set hint at the peer's expected p50 latency (ms).
#       # Smaller is better; latency is the tie-breaker among
#       # similarly-trusted peers.
#       latency_tier_ms: 30
#       # Reserved for loopback HTTP peers ONLY. Setting this on a
#       # non-loopback HTTP URL is STILL rejected — the flag is a
#       # name-checked override, not an HTTPS bypass.
#       allow_insecure_loopback: false
#       # Per-peer Agent Card cache TTL. Zero falls back to the
#       # driver default (10 minutes).
#       agent_card_ttl: 10m

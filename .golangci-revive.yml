# .golangci-revive.yml — the Phase 80 (D-138) documentation-hygiene
# lint gate (golangci-lint v2 schema; migrated 2026-05-28). It runs
# ONLY the `revive` linter:
#
#   - `exported`        — every exported identifier carries a godoc
#                         comment. `disableStutteringCheck` switches
#                         OFF revive's secondary naming-opinion
#                         sub-check ("type name X stutters as pkg.X").
#   - `package-comments`— every package carries a package-level doc
#                         comment, correctly attached.
#   - `var-naming`      — Go initialism casing on identifiers.
#
# `make lint-revive` runs this. Keep the `revive` block here in sync
# with the `linters.settings.revive` block in `.golangci.yml` — both
# files must agree on the rule arguments.
version: "2"
run:
  go: "1.26"
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - revive
  settings:
    revive:
      severity: warning
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: package-comments
        - name: var-naming
        - name: unused-parameter
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # A2A wire types are hand-transcribed verbatim from the A2A v1
      # protobuf (CLAUDE.md §3); keep their non-Go initialism casing.
      - linters:
          - revive
        path: internal/distributed/a2a/types\.go
        text: var-naming
    paths:
      - node_modules
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - node_modules
      - third_party$
      - builtin$
      - examples$

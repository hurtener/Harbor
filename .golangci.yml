run:
  timeout: 5m
  go: "1.26"
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck
    - errorlint
    - gofmt
    - goimports
    - govet
    - gosimple
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - revive
    - stylecheck
    - unconvert
    - unparam
    - misspell
    - prealloc
    - bodyclose
    - copyloopvar
    - intrange
    - nilerr
    - nolintlint

linters-settings:
  goimports:
    local-prefixes: github.com/hurtener/Harbor
  gofmt:
    simplify: true
  errcheck:
    check-type-assertions: true
    check-blank: true
  errorlint:
    errorf: true
    asserts: true
    comparison: true
  govet:
    enable-all: true
  revive:
    severity: warning
    rules:
      # Phase 80 (D-138): `exported` enforces a godoc comment on every
      # exported identifier — the binding documentation-hygiene gate.
      # `disableStutteringCheck` switches OFF revive's secondary
      # naming-opinion sub-check ("type name X stutters as pkg.X").
      # Acting on the stutter sub-check would require renaming ~20
      # exported types across package boundaries — explicitly out of
      # scope for a documentation phase and a wide API-churn risk.
      # The godoc-presence enforcement (the actual Phase 80 mandate)
      # stays fully on.
      - name: exported
        arguments:
          - disableStutteringCheck
      - name: package-comments
      - name: var-naming
      - name: unused-parameter
        disabled: true
  nolintlint:
    require-explanation: true
    require-specific: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - prealloc
    # Phase 80 (D-138): the A2A wire types are hand-transcribed
    # verbatim from the A2A v1 protobuf (CLAUDE.md §3 — "A2A v1 Go
    # shapes, hand-transcribed from proto"). The proto message names
    # `OpenIdConnectSecurityScheme` / `MutualTlsSecurityScheme` keep
    # the proto's non-Go initialism casing on purpose so the Go shapes
    # stay a 1:1 transcription of the wire spec; `var-naming` would
    # have us rename them and break that correspondence.
    - path: internal/distributed/a2a/types\.go
      linters:
        - revive
      text: var-naming

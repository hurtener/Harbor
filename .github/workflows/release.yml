name: release

# Phase 81 (RFC §12, D-139) — the release workflow.
#
# Triggered two ways:
#   - on a `v*` tag push — the real release path. Builds the
#     version-stamped CGo-free static binary, generates a SHA-256
#     checksum, attaches SLSA-style build provenance, and publishes a
#     GitHub Release with the artifacts attached. This makes the
#     Phase 81 acceptance criterion true: `git tag v1.0.0-rc.1` (pushed)
#     produces a release artifact.
#   - via `workflow_dispatch` — the manual dry-run path. Runs the same
#     `scripts/release-dryrun.sh` the `make release-dryrun` target runs,
#     so the release build can be exercised without pushing a tag.
#
# The operator tags in Phase 82 (the v1.0.0 cut). This workflow is the
# tooling that makes that tag produce an artifact; Phase 81 itself
# creates no tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------
  # dry-run — the workflow_dispatch path. Exercises the release build
  # end-to-end with NO tag, mirroring `make release-dryrun`.
  # ---------------------------------------------------------------------
  dry-run:
    name: release dry-run
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Release dry-run (build + stamp + verify, no tag)
        run: make release-dryrun

  # ---------------------------------------------------------------------
  # release — the `v*` tag-push path. Builds the version-stamped static
  # binary, attaches build provenance, and publishes a GitHub Release.
  # ---------------------------------------------------------------------
  release:
    name: build + publish release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the GitHub Release + upload assets
      id-token: write       # SLSA provenance — OIDC token for the attestor
      attestations: write   # SLSA provenance — write the attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      # The release version is the pushed tag ref (e.g. `v1.0.0-rc.1`).
      # scripts/release-build.sh reads it from HARBOR_RELEASE_VERSION;
      # this is the single point where the tag becomes the stamp.
      - name: Build the version-stamped static release artifact
        env:
          HARBOR_RELEASE_VERSION: ${{ github.ref_name }}
        run: bash scripts/release-build.sh dist

      # Discover the produced artifact path (os/arch baked into the
      # name by release-build.sh) so the later steps don't re-derive it.
      - name: Locate the release artifact
        id: artifact
        run: |
          set -euo pipefail
          bin="$(find dist -maxdepth 1 -type f -name 'harbor-*' ! -name '*.sha256' | head -1)"
          [ -n "${bin}" ] || { echo "no release artifact found in dist/" >&2; exit 1; }
          echo "path=${bin}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${bin}")" >> "$GITHUB_OUTPUT"

      # SLSA-style build provenance — the master-plan stretch goal.
      # actions/attest-build-provenance generates a signed, verifiable
      # provenance attestation for the artifact (the build's source,
      # workflow, and inputs). It is GitHub-native — no extra runtime
      # dependency, no goreleaser — so the stretch lands cleanly here
      # rather than being deferred (D-139).
      - name: Attach SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.artifact.outputs.path }}

      # Publish the GitHub Release with the binary + checksum attached.
      # gh is pre-installed on ubuntu-latest runners. A pre-release tag
      # (one carrying a `-rc` / `-beta` / `-alpha` suffix) is marked as
      # a GitHub pre-release so `v1.0.0-rc.1` is not surfaced as latest.
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          prerelease_flag=""
          case "${TAG}" in
            *-rc*|*-beta*|*-alpha*) prerelease_flag="--prerelease" ;;
          esac
          gh release create "${TAG}" \
            "${{ steps.artifact.outputs.path }}" \
            "${{ steps.artifact.outputs.path }}.sha256" \
            --title "Harbor ${TAG}" \
            --notes "Automated release for ${TAG}. See CHANGELOG.md for the full change list." \
            ${prerelease_flag}

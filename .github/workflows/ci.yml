name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mirror:
    name: AGENTS.md ↔ CLAUDE.md mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify mirror
        run: diff -q AGENTS.md CLAUDE.md

  markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: |
            **/*.md
            !node_modules
            !web/console/build

  go:
    name: go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Vet
        run: make vet
      - name: Test
        run: make test
      - name: Build
        env:
          CGO_ENABLED: '0'
        run: make build

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      # Install golangci-lint so the lint gate actually RUNS — before
      # Phase 80 the binary was never installed in CI, so `make lint`'s
      # `command -v` guard silently skipped and the gate was a no-op.
      # Installed via `go install` (NOT a prebuilt release download):
      # the prebuilt v1.64.8 release binary is built with go1.24, and
      # golangci-lint refuses to load a config whose target Go (1.26)
      # is newer than its own build-Go. `go install` compiles it here
      # with the runner's go1.26 toolchain, so build-Go == target-Go.
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      # The full golangci-lint gate (every linter in .golangci.yml,
      # including the `revive` doc-hygiene rules). The Wave 14 lint
      # hardening (D-141) cleared the backlog to zero and flipped this
      # job from the interim `make lint-revive` (revive-only) to the
      # full `make lint`, closing issue #190.
      - name: Run golangci-lint
        run: make lint

  examples:
    name: examples build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      # Phase 80 (D-138): the `examples/` tree must build and its
      # worked-example tests must pass end-to-end. A drift in a public
      # surface (`harbortest`, the tool catalog) that breaks an example
      # fails this job.
      # The build step pins CGO_ENABLED=0 (Harbor ships a CGo-free
      # static binary — CLAUDE.md §5). The test step deliberately does
      # NOT: `go test -race` requires cgo, so it must inherit the
      # runner default (CGO_ENABLED=1). The asymmetry is intentional.
      - name: Build examples
        env:
          CGO_ENABLED: '0'
        run: go build ./examples/...
      - name: Test examples (-race needs cgo — no CGO_ENABLED override)
        run: go test -race ./examples/...

  frontend-e2e:
    name: frontend-e2e (Console Playwright)
    runs-on: ubuntu-latest
    # Phase 75 (D-115) — the Console e2e Playwright harness baseline.
    # `needs: [go]` only ORDERS this job after `go`; it does NOT reuse the
    # `go` job's `make build`. Per the D-131 console-build fix this job runs
    # its OWN build sequence — `make console-build` (stage the SvelteKit
    # bundle into `cmd/harbor/consoledist/`) THEN `make build` (the binary
    # embeds the staged bundle via `embed.FS`). The order is load-bearing:
    # `make build` before `make console-build` would embed an empty
    # consoledist/ and `harbor console` would never hydrate. The harness
    # boots `harbor console` (D-091 — NOT `harbor dev`). The whole job skips
    # gracefully when `web/console/` is absent (the directory-missing → SKIP
    # analogue of the §4.2 "404/405/501 → SKIP" smoke convention).
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - name: Detect web/console/
        id: detect
        run: |
          if [ -f web/console/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "web/console/ absent — SKIP (Stage-1 SvelteKit scaffold pending)"
          fi
      - uses: actions/setup-go@v5
        if: steps.detect.outputs.present == 'true'
        with:
          go-version: '1.26'
          check-latest: true
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: 'lts/*'
      # Phase 75a (D-131) — build + stage the SvelteKit Console bundle
      # BEFORE `make build`. `harbor console` (D-091) serves the Console
      # via `embed.FS` of `cmd/harbor/consoledist/`, which is gitignored
      # except `.gitkeep` (the bundle is a build artifact — §4.5 #9).
      # `make console-build` runs `npm ci && npm run build` in
      # `web/console/` and copies `build/` → `cmd/harbor/consoledist/`.
      # If `make build` ran first, it would embed an EMPTY consoledist/
      # and `harbor console` would serve the index but never hydrate the
      # SvelteKit app — the Playwright per-page specs would all fail.
      # `console-build` already runs `npm ci`, so the node_modules the
      # later Playwright steps need are installed by this step.
      # Phase 75a (D-131): the binding page-coverage gate — every
      # docs/design/console/page-<slug>.md has a matching
      # web/console/tests/<slug>-page.spec.ts (operator §12 lock-in #7).
      - name: Console page-coverage check
        if: steps.detect.outputs.present == 'true'
        run: make wave13-coverage-check
      - name: Build + stage the Console bundle (console-build)
        if: steps.detect.outputs.present == 'true'
        run: make console-build
      - name: Build bin/harbor (embeds the staged Console bundle)
        if: steps.detect.outputs.present == 'true'
        run: make build
      - name: Cache Playwright browsers
        if: steps.detect.outputs.present == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/console/package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.detect.outputs.present == 'true'
        working-directory: web/console
        run: npm run test:e2e:install
      - name: Run Console Playwright suite
        if: steps.detect.outputs.present == 'true'
        working-directory: web/console
        run: npm run test:e2e

  preflight:
    name: preflight gate
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run preflight
        run: make preflight
      # Phase 68 (D-088) — `harbor validate` as a CI pre-flight check
      # for the example configs we ship. This closes the master-plan
      # acceptance loop ("CI uses validate as a pre-flight check") and
      # catches drift between example fixtures and the loader's rules
      # before it lands on `main`. Make preflight already builds
      # ./bin/harbor; we just run the new subcommand here.
      - name: harbor validate examples/*.yaml
        run: |
          set -euxo pipefail
          for f in examples/*.yaml; do
            ./bin/harbor validate "$f"
          done

  perf-regression:
    name: perf-regression (benchmark gate)
    runs-on: ubuntu-latest
    # Phase 79 (D-136) — the performance-benchmark regression gate.
    # Compares the PR's test/benchmarks/ numbers against the SAME
    # benchmarks run on the PR's base commit, BOTH on this runner.
    # Same-runner pairing is the only hardware-noise-immune
    # comparison: Go embeds GOMAXPROCS in benchmark names, so a
    # committed baseline generated on different-core-count hardware
    # cannot be paired by benchstat. When the base commit has no
    # test/benchmarks/ directory (the PR that introduces the suite),
    # there is no prior baseline to regress against and the
    # comparison is skipped. The gate tolerates runner noise via
    # `-count` sampling + benchstat's `~` (non-significant) verdict +
    # a 30% threshold (D-136). `benchstat` is fetched via `go run`
    # inside the script; it never enters the runtime binary's go.mod.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: perf-regression gate (base-vs-PR, same runner)
        env:
          BENCH_FLAGS: "-run=^$ -bench=. -benchmem -count=6 -benchtime=100ms"
        run: |
          set -euo pipefail
          PR_SHA="$(git rev-parse HEAD)"
          BASE_SHA=""
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --depth=1 origin "${GITHUB_BASE_REF}" >/dev/null 2>&1 || true
            BASE_SHA="$(git rev-parse "origin/${GITHUB_BASE_REF}" 2>/dev/null || echo '')"
          fi
          [ -z "${BASE_SHA}" ] && BASE_SHA="$(git rev-parse 'HEAD^' 2>/dev/null || echo '')"
          echo "perf-gate: PR=${PR_SHA} base=${BASE_SHA:-<none>}"
          # shellcheck disable=SC2086
          go test ${BENCH_FLAGS} ./test/benchmarks/... | tee /tmp/perf-pr.txt
          if [ -n "${BASE_SHA}" ] && git cat-file -e "${BASE_SHA}:test/benchmarks" 2>/dev/null; then
            git checkout --quiet "${BASE_SHA}"
            # shellcheck disable=SC2086
            go test ${BENCH_FLAGS} ./test/benchmarks/... | tee /tmp/perf-base.txt
            git checkout --quiet "${PR_SHA}"
            PERF_BASE_FILE=/tmp/perf-base.txt PERF_PR_FILE=/tmp/perf-pr.txt \
              bash scripts/perf/check-regression.sh
          else
            echo "perf-gate: base commit has no test/benchmarks/ — no prior baseline to regress against (introducing PR); comparison skipped."
          fi

  state-postgres:
    name: state/postgres conformance (postgres:16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harbor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run state/postgres tests against postgres:16
        # Note: CGO_ENABLED is intentionally NOT set here — `go test
        # -race` requires the cgo race runtime, which means
        # CGO_ENABLED=1 (the Ubuntu/Go default). The `make build`
        # step in the matrix `go` job pins CGO_ENABLED=0 only for the
        # static-binary artifact; it does not propagate to test runs.
        env:
          HARBOR_PG_DSN: postgres://postgres:postgres@localhost:5432/harbor_test?sslmode=disable
        run: go test -race -count=1 -timeout 240s ./internal/state/drivers/postgres/...
      - name: Run artifacts/postgres tests against postgres:16
        # Phase 18: same container as the state/postgres step above.
        # Running both packages in the same job keeps CI overhead
        # minimal (~10–20s extra) while preserving the postgres:16
        # gate for the artifact-blob driver.
        env:
          HARBOR_PG_DSN: postgres://postgres:postgres@localhost:5432/harbor_test?sslmode=disable
        run: go test -race -count=1 -timeout 240s ./internal/artifacts/drivers/postgres/...

  memory-postgres:
    name: memory/postgres conformance (postgres:16)
    runs-on: ubuntu-latest
    # Phase 25: persistent memory drivers. Mirrors state-postgres
    # above — a postgres:16 service container, HARBOR_PG_DSN piped
    # to the test run. The driver's own tests skip-clean when the
    # env var is unset (local-dev), so this job is the only place
    # the Postgres memory driver is actually exercised end-to-end.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harbor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run memory/postgres tests against postgres:16
        # CGO_ENABLED intentionally unset (same rationale as the
        # state-postgres job above — -race requires the cgo race
        # runtime; only the static-binary build pins CGO_ENABLED=0).
        env:
          HARBOR_PG_DSN: postgres://postgres:postgres@localhost:5432/harbor_test?sslmode=disable
        run: go test -race -count=1 -timeout 240s ./internal/memory/drivers/postgres/...

  artifacts-s3:
    name: artifacts/s3 conformance (MinIO)
    runs-on: ubuntu-latest
    # MinIO is the S3-compat backend Harbor's Phase 19 driver tests
    # against in CI. We launch it via `docker run` rather than a
    # GitHub Actions service container because the official
    # `minio/minio` image needs `server /data` as the entrypoint args
    # (services blocks can't pass command args cleanly), and Bitnami's
    # alternative dropped its `latest` tag. Credentials are documented
    # dummy values per AGENTS.md §7 #2 — no real secrets cross this
    # boundary.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Start MinIO and create harbor-test bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          docker run -d --name harbor-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-12-18T13-15-44Z \
            server /data
          # Poll for liveness; create the bucket once MinIO answers.
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:9000/minio/health/live; then
              echo "MinIO is live"
              break
            fi
            sleep 2
          done
          # AWS CLI is pre-installed on ubuntu-latest runners.
          for i in $(seq 1 15); do
            if aws --endpoint-url http://localhost:9000 s3 mb s3://harbor-test 2>/dev/null; then
              echo "harbor-test bucket created"
              break
            fi
            if aws --endpoint-url http://localhost:9000 s3api head-bucket --bucket harbor-test 2>/dev/null; then
              echo "harbor-test bucket already present"
              break
            fi
            sleep 2
          done
          aws --endpoint-url http://localhost:9000 s3api head-bucket --bucket harbor-test
      - name: Run artifacts/s3 tests against MinIO
        # Note: CGO_ENABLED is intentionally NOT set here — same
        # rationale as the state-postgres job above. The static
        # binary CGO_ENABLED=0 invariant is enforced only at build
        # time, not in test runs.
        env:
          HARBOR_TEST_S3_DSN: |
            endpoint=http://localhost:9000
            bucket=harbor-test
            region=us-east-1
            access_key=minioadmin
            secret_key=minioadmin
            use_path_style=true
        run: go test -race -count=1 -timeout 240s ./internal/artifacts/drivers/s3/...
      - name: Tear down MinIO
        if: always()
        run: |
          docker logs harbor-minio || true
          docker rm -f harbor-minio || true

  isolation:
    name: cross-tenant isolation conformance harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      # Phase 76: the master cross-tenant + cross-session isolation
      # gate. Runs the every-PR fast soak window (~3 s, 100 concurrent
      # sessions) under -race. The master-plan-specified 30 s soak is
      # opt-in via HARBOR_ISOLATION_SOAK=30s; the fast window catches a
      # cross-scope leak with overwhelming probability while keeping CI
      # fast (D-134). CGO_ENABLED is intentionally NOT set — `go test
      # -race` needs the cgo race runtime (CGO_ENABLED=1, the default).
      - name: Run the isolation conformance harness
        run: go test -race -count=1 -timeout 240s -run 'TestE2E_Isolation' ./test/integration/...

  # Phase 77 (RFC §3.5, §6.1) — the goroutine-leak conformance harness.
  # Runs the table-driven `TestE2E_Phase77_GoroutineLeakConformance`
  # suite under `-race` on every PR: every long-lived Runtime component
  # is constructed → exercised → torn down N times and the goroutine
  # count is asserted back to baseline. A leak here is a real bug. The
  # suite also runs inside the `go` job's `make test`; this dedicated
  # job isolates the leak gate so a failure names the harness directly.
  leak-harness:
    name: goroutine-leak conformance harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run the goroutine-leak conformance harness (-race)
        run: go test -race -count=1 -timeout 300s -run TestE2E_Phase77_GoroutineLeakConformance ./test/integration/...

  # Phase 78 (RFC §6.1, §6.5, §6.11, §6.13, §3.4) — the chaos /
  # fault-injection harness. Runs the table-driven
  # `TestE2E_Phase78_ChaosFaultInjection` suite under `-race` on every
  # PR: each of the five master-plan failure modes (kill mid-run, drop
  # messages, provider quirks, StateStore disconnect, pause-deserialize
  # failure) is injected against the real Runtime component and the
  # documented loud error/event + recovery path is asserted. A fault
  # that is silently swallowed is a real bug. The suite also runs
  # inside the `go` job's `make test`; this dedicated job isolates the
  # chaos gate so a failure names the harness directly.
  chaos:
    name: chaos / fault-injection harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run the chaos / fault-injection harness (-race)
        run: go test -race -count=1 -timeout 300s -run TestE2E_Phase78_ChaosFaultInjection ./test/integration/...

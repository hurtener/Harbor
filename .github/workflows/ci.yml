name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mirror:
    name: AGENTS.md ↔ CLAUDE.md mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify mirror
        run: diff -q AGENTS.md CLAUDE.md

  markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: |
            **/*.md
            !node_modules
            !web/console/build

  go:
    name: go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Vet
        run: make vet
      - name: Test
        run: make test
      - name: Build
        env:
          CGO_ENABLED: '0'
        run: make build

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run lint (skips when no Go sources yet)
        run: make lint

  preflight:
    name: preflight gate
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run preflight
        run: make preflight

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mirror:
    name: AGENTS.md ↔ CLAUDE.md mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify mirror
        run: diff -q AGENTS.md CLAUDE.md

  markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: |
            **/*.md
            !node_modules
            !web/console/build

  go:
    name: go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Vet
        run: make vet
      - name: Test
        run: make test
      - name: Build
        env:
          CGO_ENABLED: '0'
        run: make build

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run lint (skips when no Go sources yet)
        run: make lint

  preflight:
    name: preflight gate
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run preflight
        run: make preflight

  state-postgres:
    name: state/postgres conformance (postgres:16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harbor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run state/postgres tests against postgres:16
        # Note: CGO_ENABLED is intentionally NOT set here — `go test
        # -race` requires the cgo race runtime, which means
        # CGO_ENABLED=1 (the Ubuntu/Go default). The `make build`
        # step in the matrix `go` job pins CGO_ENABLED=0 only for the
        # static-binary artifact; it does not propagate to test runs.
        env:
          HARBOR_PG_DSN: postgres://postgres:postgres@localhost:5432/harbor_test?sslmode=disable
        run: go test -race -count=1 -timeout 240s ./internal/state/drivers/postgres/...

  artifacts-s3:
    name: artifacts/s3 conformance (MinIO)
    runs-on: ubuntu-latest
    services:
      # MinIO is the S3-compat backend Harbor's Phase 19 driver tests
      # against in CI. The `bitnami/minio:latest` image exposes a
      # `/minio/health/live` health endpoint we can poll. Credentials
      # are documented dummy values per AGENTS.md §7 #2 — no real
      # secrets cross this boundary.
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          # Pre-create the test bucket via Bitnami's helper var so we
          # don't need a separate `mc mb` step.
          MINIO_DEFAULT_BUCKETS: harbor-test
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Wait for MinIO bucket
        # Defense-in-depth: even with MINIO_DEFAULT_BUCKETS, the
        # bucket may take a moment after the health check goes
        # green. Poll for up to 30s using the AWS CLI (pre-installed
        # on ubuntu-latest runners).
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -e
          for i in $(seq 1 15); do
            if aws --endpoint-url http://localhost:9000 s3api head-bucket --bucket harbor-test 2>/dev/null; then
              echo "harbor-test bucket ready"
              exit 0
            fi
            # Best-effort create if it isn't there yet.
            aws --endpoint-url http://localhost:9000 s3 mb s3://harbor-test 2>/dev/null || true
            sleep 2
          done
          echo "harbor-test bucket never became ready" >&2
          exit 1
      - name: Run artifacts/s3 tests against MinIO
        # Note: CGO_ENABLED is intentionally NOT set here — same
        # rationale as the state-postgres job above. The static
        # binary CGO_ENABLED=0 invariant is enforced only at build
        # time, not in test runs.
        env:
          HARBOR_TEST_S3_DSN: |
            endpoint=http://localhost:9000
            bucket=harbor-test
            region=us-east-1
            access_key=minioadmin
            secret_key=minioadmin
            use_path_style=true
        run: go test -race -count=1 -timeout 240s ./internal/artifacts/drivers/s3/...

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mirror:
    name: AGENTS.md ↔ CLAUDE.md mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify mirror
        run: diff -q AGENTS.md CLAUDE.md

  markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: |
            **/*.md
            !node_modules
            !web/console/build

  go:
    name: go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Vet
        run: make vet
      - name: Test
        run: make test
      - name: Build
        env:
          CGO_ENABLED: '0'
        run: make build

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run lint (skips when no Go sources yet)
        run: make lint

  frontend-e2e:
    name: frontend-e2e (Console Playwright)
    runs-on: ubuntu-latest
    # Phase 75 (D-115) — the Console e2e Playwright harness baseline.
    # `needs: [go]` only ORDERS this job after `go`; it does NOT reuse the
    # `go` job's `make build`. Per the D-131 console-build fix this job runs
    # its OWN build sequence — `make console-build` (stage the SvelteKit
    # bundle into `cmd/harbor/consoledist/`) THEN `make build` (the binary
    # embeds the staged bundle via `embed.FS`). The order is load-bearing:
    # `make build` before `make console-build` would embed an empty
    # consoledist/ and `harbor console` would never hydrate. The harness
    # boots `harbor console` (D-091 — NOT `harbor dev`). The whole job skips
    # gracefully when `web/console/` is absent (the directory-missing → SKIP
    # analogue of the §4.2 "404/405/501 → SKIP" smoke convention).
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - name: Detect web/console/
        id: detect
        run: |
          if [ -f web/console/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "web/console/ absent — SKIP (Stage-1 SvelteKit scaffold pending)"
          fi
      - uses: actions/setup-go@v5
        if: steps.detect.outputs.present == 'true'
        with:
          go-version: '1.26'
          check-latest: true
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: 'lts/*'
      # Phase 75a (D-131) — build + stage the SvelteKit Console bundle
      # BEFORE `make build`. `harbor console` (D-091) serves the Console
      # via `embed.FS` of `cmd/harbor/consoledist/`, which is gitignored
      # except `.gitkeep` (the bundle is a build artifact — §4.5 #9).
      # `make console-build` runs `npm ci && npm run build` in
      # `web/console/` and copies `build/` → `cmd/harbor/consoledist/`.
      # If `make build` ran first, it would embed an EMPTY consoledist/
      # and `harbor console` would serve the index but never hydrate the
      # SvelteKit app — the Playwright per-page specs would all fail.
      # `console-build` already runs `npm ci`, so the node_modules the
      # later Playwright steps need are installed by this step.
      # Phase 75a (D-131): the binding page-coverage gate — every
      # docs/design/console/page-<slug>.md has a matching
      # web/console/tests/<slug>-page.spec.ts (operator §12 lock-in #7).
      - name: Console page-coverage check
        if: steps.detect.outputs.present == 'true'
        run: make wave13-coverage-check
      - name: Build + stage the Console bundle (console-build)
        if: steps.detect.outputs.present == 'true'
        run: make console-build
      - name: Build bin/harbor (embeds the staged Console bundle)
        if: steps.detect.outputs.present == 'true'
        run: make build
      - name: Cache Playwright browsers
        if: steps.detect.outputs.present == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/console/package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.detect.outputs.present == 'true'
        working-directory: web/console
        run: npm run test:e2e:install
      - name: Run Console Playwright suite
        if: steps.detect.outputs.present == 'true'
        working-directory: web/console
        run: npm run test:e2e

  preflight:
    name: preflight gate
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run preflight
        run: make preflight
      # Phase 68 (D-088) — `harbor validate` as a CI pre-flight check
      # for the example configs we ship. This closes the master-plan
      # acceptance loop ("CI uses validate as a pre-flight check") and
      # catches drift between example fixtures and the loader's rules
      # before it lands on `main`. Make preflight already builds
      # ./bin/harbor; we just run the new subcommand here.
      - name: harbor validate examples/*.yaml
        run: |
          set -euxo pipefail
          for f in examples/*.yaml; do
            ./bin/harbor validate "$f"
          done

  state-postgres:
    name: state/postgres conformance (postgres:16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harbor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run state/postgres tests against postgres:16
        # Note: CGO_ENABLED is intentionally NOT set here — `go test
        # -race` requires the cgo race runtime, which means
        # CGO_ENABLED=1 (the Ubuntu/Go default). The `make build`
        # step in the matrix `go` job pins CGO_ENABLED=0 only for the
        # static-binary artifact; it does not propagate to test runs.
        env:
          HARBOR_PG_DSN: postgres://postgres:postgres@localhost:5432/harbor_test?sslmode=disable
        run: go test -race -count=1 -timeout 240s ./internal/state/drivers/postgres/...
      - name: Run artifacts/postgres tests against postgres:16
        # Phase 18: same container as the state/postgres step above.
        # Running both packages in the same job keeps CI overhead
        # minimal (~10–20s extra) while preserving the postgres:16
        # gate for the artifact-blob driver.
        env:
          HARBOR_PG_DSN: postgres://postgres:postgres@localhost:5432/harbor_test?sslmode=disable
        run: go test -race -count=1 -timeout 240s ./internal/artifacts/drivers/postgres/...

  memory-postgres:
    name: memory/postgres conformance (postgres:16)
    runs-on: ubuntu-latest
    # Phase 25: persistent memory drivers. Mirrors state-postgres
    # above — a postgres:16 service container, HARBOR_PG_DSN piped
    # to the test run. The driver's own tests skip-clean when the
    # env var is unset (local-dev), so this job is the only place
    # the Postgres memory driver is actually exercised end-to-end.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harbor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Run memory/postgres tests against postgres:16
        # CGO_ENABLED intentionally unset (same rationale as the
        # state-postgres job above — -race requires the cgo race
        # runtime; only the static-binary build pins CGO_ENABLED=0).
        env:
          HARBOR_PG_DSN: postgres://postgres:postgres@localhost:5432/harbor_test?sslmode=disable
        run: go test -race -count=1 -timeout 240s ./internal/memory/drivers/postgres/...

  artifacts-s3:
    name: artifacts/s3 conformance (MinIO)
    runs-on: ubuntu-latest
    # MinIO is the S3-compat backend Harbor's Phase 19 driver tests
    # against in CI. We launch it via `docker run` rather than a
    # GitHub Actions service container because the official
    # `minio/minio` image needs `server /data` as the entrypoint args
    # (services blocks can't pass command args cleanly), and Bitnami's
    # alternative dropped its `latest` tag. Credentials are documented
    # dummy values per AGENTS.md §7 #2 — no real secrets cross this
    # boundary.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Start MinIO and create harbor-test bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          docker run -d --name harbor-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2024-12-18T13-15-44Z \
            server /data
          # Poll for liveness; create the bucket once MinIO answers.
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:9000/minio/health/live; then
              echo "MinIO is live"
              break
            fi
            sleep 2
          done
          # AWS CLI is pre-installed on ubuntu-latest runners.
          for i in $(seq 1 15); do
            if aws --endpoint-url http://localhost:9000 s3 mb s3://harbor-test 2>/dev/null; then
              echo "harbor-test bucket created"
              break
            fi
            if aws --endpoint-url http://localhost:9000 s3api head-bucket --bucket harbor-test 2>/dev/null; then
              echo "harbor-test bucket already present"
              break
            fi
            sleep 2
          done
          aws --endpoint-url http://localhost:9000 s3api head-bucket --bucket harbor-test
      - name: Run artifacts/s3 tests against MinIO
        # Note: CGO_ENABLED is intentionally NOT set here — same
        # rationale as the state-postgres job above. The static
        # binary CGO_ENABLED=0 invariant is enforced only at build
        # time, not in test runs.
        env:
          HARBOR_TEST_S3_DSN: |
            endpoint=http://localhost:9000
            bucket=harbor-test
            region=us-east-1
            access_key=minioadmin
            secret_key=minioadmin
            use_path_style=true
        run: go test -race -count=1 -timeout 240s ./internal/artifacts/drivers/s3/...
      - name: Tear down MinIO
        if: always()
        run: |
          docker logs harbor-minio || true
          docker rm -f harbor-minio || true
